name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ShivsLabAPI.sln

      - name: Build
        run: msbuild ShivsLabAPI/ShivsLabAPI.csproj /p:Configuration=Release /restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShivsLabAPI
          path: ShivsLabAPI/bin/Release/ShivsLabAPI.dll